<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Audit</title>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: linear-gradient(180deg, #f5f5f7 0%, #e8e8ed 100%);
            min-height: 100vh;
            padding: 0;
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        h1 {
            color: #1d1d1f;
            text-align: center;
            margin-bottom: 24px;
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        h2 {
            color: #1d1d1f;
            margin-bottom: 16px;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        h3 {
            color: #1d1d1f;
            margin-bottom: 12px;
            font-size: 17px;
            font-weight: 600;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #1d1d1f;
            font-size: 15px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            background: rgba(142, 142, 147, 0.12);
            color: #1d1d1f;
            transition: all 0.2s ease;
            margin-bottom: 12px;
        }

        input[type="text"]:focus {
            outline: none;
            background: rgba(142, 142, 147, 0.18);
        }

        button {
            width: 100%;
            padding: 16px;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
        }

        button:hover {
            background: #0051d5;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: #ff3b30;
        }

        .btn-secondary:hover {
            background: #d70015;
        }

        .btn-success {
            background: #34c759;
        }

        .btn-success:hover {
            background: #248a3d;
        }

        .btn-warning {
            background: #ff9500;
        }

        .status {
            padding: 12px 16px;
            border-radius: 12px;
            margin: 12px 0;
            font-weight: 500;
            text-align: center;
            font-size: 15px;
        }

        .status-success {
            background: rgba(52, 199, 89, 0.15);
            color: #248a3d;
        }

        .status-error {
            background: rgba(255, 59, 48, 0.15);
            color: #d70015;
        }

        .status-info {
            background: rgba(0, 122, 255, 0.15);
            color: #0051d5;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .stat-box {
            background: linear-gradient(135deg, #007aff 0%, #0051d5 100%);
            color: white;
            padding: 16px;
            border-radius: 14px;
            text-align: center;
        }

        .stat-box.success {
            background: linear-gradient(135deg, #34c759 0%, #248a3d 100%);
        }

        .stat-box.warning {
            background: linear-gradient(135deg, #ff9500 0%, #ff6482 100%);
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            display: block;
        }

        .stat-label {
            font-size: 13px;
            opacity: 0.9;
            margin-top: 4px;
        }

        #reader {
            border-radius: 16px;
            overflow: hidden;
            margin: 16px 0;
        }

        .items-list {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 16px;
        }

        .item {
            padding: 14px 16px;
            background: rgba(142, 142, 147, 0.08);
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid transparent;
        }

        .item.matched {
            background: rgba(52, 199, 89, 0.12);
            border-left-color: #34c759;
        }

        .item.mismatch {
            background: rgba(0, 122, 255, 0.12);
            border-left-color: #007aff;
        }

        .item.missing {
            background: rgba(255, 59, 48, 0.12);
            border-left-color: #ff3b30;
        }

        .item.extra {
            background: rgba(255, 149, 0, 0.12);
            border-left-color: #ff9500;
        }

        .item-info {
            flex: 1;
        }

        .item-sku {
            font-weight: 600;
            font-size: 15px;
            color: #1d1d1f;
        }

        .item-name {
            font-size: 13px;
            color: rgba(60, 60, 67, 0.6);
            margin-top: 2px;
        }

        .item-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: white;
            margin-left: 12px;
        }

        .badge-matched {
            background: #34c759;
        }

        .badge-mismatch {
            background: #007aff;
        }

        .badge-missing {
            background: #ff3b30;
        }

        .badge-extra {
            background: #ff9500;
        }

        .export-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }

        .btn-excel {
            background: #34c759;
        }

        .btn-pdf {
            background: #ff3b30;
        }

        .hidden {
            display: none;
        }

        .help-text {
            font-size: 13px;
            color: rgba(60, 60, 67, 0.6);
            margin-top: 6px;
        }

        .info-box {
            background: rgba(0, 122, 255, 0.08);
            border-left: 3px solid #007aff;
            padding: 16px;
            border-radius: 12px;
            margin: 16px 0;
            font-size: 14px;
            line-height: 1.5;
        }

        .scan-feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 24px 40px;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 600;
            z-index: 1000;
            animation: fadeInOut 1s ease-in-out;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stock Audit</h1>

        <!-- Setup Section -->
        <div id="setupSection" class="card">
            <h2>Load Inventory</h2>
            
            <div class="info-box">
                <strong>Setup:</strong><br>
                1. Your Google Sheet must have: <strong>SKU | PRODUCT Name | Quantity</strong><br>
                2. Share sheet: "Anyone with link can view"<br>
                3. Enter range below (e.g., Sheet1!A1:C100)
            </div>

            <label>Sheet Range:</label>
            <input type="text" id="sheetRange" placeholder="Sheet1!A1:C100" value="Sheet1!A1:C100">
            
            <button id="loadBtn">Load Inventory</button>
            
            <div id="setupStatus"></div>
        </div>

        <!-- Scanner Section -->
        <div id="scannerSection" class="card hidden">
            <h2>Scan Items</h2>
            
            <div class="stats">
                <div class="stat-box">
                    <span class="stat-number" id="totalItems">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat-box success">
                    <span class="stat-number" id="scannedCount">0</span>
                    <span class="stat-label">Scanned</span>
                </div>
                <div class="stat-box warning">
                    <span class="stat-number" id="uniqueCount">0</span>
                    <span class="stat-label">Unique</span>
                </div>
            </div>

            <button id="startScanBtn">Start Scanner</button>
            <button id="stopScanBtn" class="btn-secondary hidden">Stop Scanner</button>
            <button id="rescanBtn" class="btn-warning hidden">Scan Same Item Again</button>
            
            <div id="reader"></div>
            <div id="scanStatus"></div>

            <div class="items-list">
                <h3>Scanned Items</h3>
                <div id="scannedList"></div>
            </div>

            <div class="items-list" style="margin-top: 20px;">
                <h3 style="color: #ff3b30;">Missing Items</h3>
                <div id="missingList"></div>
            </div>

            <button class="btn-success" id="generateReportBtn" style="margin-top: 20px;">Generate Report</button>
        </div>

        <!-- Report Section -->
        <div id="reportSection" class="card hidden">
            <h2>Audit Report</h2>
            
            <div class="stats">
                <div class="stat-box success">
                    <span class="stat-number" id="matchCount">0</span>
                    <span class="stat-label">Matched</span>
                </div>
                <div class="stat-box" style="background: linear-gradient(135deg, #ff3b30 0%, #d70015 100%);">
                    <span class="stat-number" id="missingCount">0</span>
                    <span class="stat-label">Missing</span>
                </div>
                <div class="stat-box warning">
                    <span class="stat-number" id="issuesCount">0</span>
                    <span class="stat-label">Issues</span>
                </div>
            </div>

            <div class="export-buttons">
                <button class="btn-excel" id="excelBtn">Download Excel</button>
                <button class="btn-pdf" id="pdfBtn">Download PDF</button>
            </div>

            <div id="reportResults"></div>

            <button id="newAuditBtn" style="margin-top: 20px;">Start New Audit</button>
        </div>
    </div>

    <script>
        // Configuration
        const API_KEY = 'AIzaSyCGcOb2oB7717oB02q-EmUhujVee9Oilc0';
        const SHEET_ID = '1z_0aV_trLsnHeSQ_L1BHaNlPUcG3taMNJjGdHtyryy8';
        const SCAN_COOLDOWN = 2000; // 2 seconds

        // State
        let inventory = [];
        let scannedItems = {};
        let scanner = null;
        let lastScan = { code: null, time: 0 };

        // DOM Elements
        const elements = {
            setupSection: document.getElementById('setupSection'),
            scannerSection: document.getElementById('scannerSection'),
            reportSection: document.getElementById('reportSection'),
            sheetRange: document.getElementById('sheetRange'),
            loadBtn: document.getElementById('loadBtn'),
            setupStatus: document.getElementById('setupStatus'),
            startScanBtn: document.getElementById('startScanBtn'),
            stopScanBtn: document.getElementById('stopScanBtn'),
            rescanBtn: document.getElementById('rescanBtn'),
            scanStatus: document.getElementById('scanStatus'),
            generateReportBtn: document.getElementById('generateReportBtn'),
            excelBtn: document.getElementById('excelBtn'),
            pdfBtn: document.getElementById('pdfBtn'),
            newAuditBtn: document.getElementById('newAuditBtn'),
            scannedList: document.getElementById('scannedList'),
            missingList: document.getElementById('missingList'),
            reportResults: document.getElementById('reportResults'),
            totalItems: document.getElementById('totalItems'),
            scannedCount: document.getElementById('scannedCount'),
            uniqueCount: document.getElementById('uniqueCount'),
            matchCount: document.getElementById('matchCount'),
            missingCount: document.getElementById('missingCount'),
            issuesCount: document.getElementById('issuesCount')
        };

        // Event Listeners
        elements.loadBtn.addEventListener('click', loadInventory);
        elements.startScanBtn.addEventListener('click', startScanner);
        elements.stopScanBtn.addEventListener('click', stopScanner);
        elements.rescanBtn.addEventListener('click', allowRescan);
        elements.generateReportBtn.addEventListener('click', generateReport);
        elements.excelBtn.addEventListener('click', exportExcel);
        elements.pdfBtn.addEventListener('click', exportPDF);
        elements.newAuditBtn.addEventListener('click', resetAudit);

        // Load Inventory
        async function loadInventory() {
            const range = elements.sheetRange.value.trim();
            
            if (!range) {
                showStatus('setupStatus', 'Please enter sheet range', 'error');
                return;
            }

            showStatus('setupStatus', 'Loading inventory...', 'info');
            elements.loadBtn.disabled = true;

            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                if (!data.values || data.values.length < 2) {
                    throw new Error('Sheet has no data. Make sure row 1 has headers.');
                }

                inventory = [];
                for (let i = 1; i < data.values.length; i++) {
                    const row = data.values[i];
                    if (row[0]) {
                        inventory.push({
                            sku: row[0].toString().trim(),
                            name: row[1] ? row[1].toString().trim() : 'Unknown',
                            quantity: row[2] ? parseInt(row[2]) : 0
                        });
                    }
                }

                if (inventory.length === 0) {
                    throw new Error('No valid items found in sheet');
                }

                showStatus('setupStatus', `✅ Loaded ${inventory.length} items!`, 'success');
                elements.totalItems.textContent = inventory.length;
                
                setTimeout(() => {
                    elements.setupSection.classList.add('hidden');
                    elements.scannerSection.classList.remove('hidden');
                }, 1000);

            } catch (error) {
                console.error(error);
                let msg = error.message;
                if (msg.includes('403')) msg = 'API key error. Check permissions.';
                if (msg.includes('404')) msg = 'Sheet not found. Check Sheet ID.';
                showStatus('setupStatus', '❌ ' + msg, 'error');
            } finally {
                elements.loadBtn.disabled = false;
            }
        }

        // Start Scanner
        function startScanner() {
            scanner = new Html5Qrcode("reader");
            
            scanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                onScanSuccess,
                onScanError
            );

            elements.startScanBtn.classList.add('hidden');
            elements.stopScanBtn.classList.remove('hidden');
            elements.rescanBtn.classList.remove('hidden');
            showStatus('scanStatus', '📷 Scanner active (2 sec cooldown)', 'info');
        }

        // Stop Scanner
        function stopScanner() {
            if (scanner) {
                scanner.stop();
                elements.startScanBtn.classList.remove('hidden');
                elements.stopScanBtn.classList.add('hidden');
                elements.rescanBtn.classList.add('hidden');
                showStatus('scanStatus', 'Scanner stopped', 'info');
            }
        }

        // Scan Success
        function onScanSuccess(code) {
            const now = Date.now();
            
            // Cooldown check
            if (code === lastScan.code && (now - lastScan.time) < SCAN_COOLDOWN) {
                return;
            }

            lastScan = { code, time: now };

            const item = inventory.find(i => i.sku === code);
            
            if (!scannedItems[code]) {
                scannedItems[code] = {
                    sku: code,
                    name: item ? item.name : 'Unknown',
                    count: 0
                };
            }
            scannedItems[code].count++;

            updateScannedList();
            updateMissingList();
            updateStats();
            
            showFeedback(item ? item.name : 'Unknown Item');
            playBeep();
        }

        function onScanError() {
            // Ignore scan errors
        }

        // Allow Rescan
        function allowRescan() {
            lastScan = { code: null, time: 0 };
            showFeedback('Ready to rescan!');
        }

        // Update Scanned List
        function updateScannedList() {
            elements.scannedList.innerHTML = '';
            
            Object.values(scannedItems).forEach(item => {
                const invItem = inventory.find(i => i.sku === item.sku);
                let status = 'extra';
                let badge = 'Extra';
                
                if (invItem) {
                    if (item.count === invItem.quantity) {
                        status = 'matched';
                        badge = 'Match';
                    } else {
                        status = 'mismatch';
                        badge = 'Mismatch';
                    }
                }

                const div = document.createElement('div');
                div.className = `item ${status}`;
                div.innerHTML = `
                    <div class="item-info">
                        <div class="item-sku">${item.sku}</div>
                        <div class="item-name">${item.name}</div>
                    </div>
                    <div class="item-badge badge-${status}">${badge} ${item.count}x</div>
                `;
                elements.scannedList.appendChild(div);
            });
        }

        // Update Missing List
        function updateMissingList() {
            elements.missingList.innerHTML = '';
            
            const missing = inventory.filter(item => !scannedItems[item.sku]);
            
            if (missing.length === 0) {
                elements.missingList.innerHTML = '<div class="status status-success">✅ All items scanned!</div>';
                return;
            }

            missing.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item missing';
                div.innerHTML = `
                    <div class="item-info">
                        <div class="item-sku">${item.sku}</div>
                        <div class="item-name">${item.name}</div>
                    </div>
                    <div class="item-badge badge-missing">${item.quantity}x</div>
                `;
                elements.missingList.appendChild(div);
            });
        }

        // Update Stats
        function updateStats() {
            const total = Object.values(scannedItems).reduce((sum, item) => sum + item.count, 0);
            const unique = Object.keys(scannedItems).length;
            
            elements.scannedCount.textContent = total;
            elements.uniqueCount.textContent = unique;
        }

        // Generate Report
        function generateReport() {
            const missing = inventory.filter(item => !scannedItems[item.sku]);
            const matched = [];
            const mismatches = [];
            const extra = [];

            inventory.forEach(item => {
                if (scannedItems[item.sku]) {
                    const scanned = scannedItems[item.sku].count;
                    if (scanned === item.quantity) {
                        matched.push(item);
                    } else {
                        mismatches.push({
                            ...item,
                            scanned,
                            diff: scanned - item.quantity
                        });
                    }
                }
            });

            Object.keys(scannedItems).forEach(sku => {
                if (!inventory.find(i => i.sku === sku)) {
                    extra.push(scannedItems[sku]);
                }
            });

            elements.matchCount.textContent = matched.length;
            elements.missingCount.textContent = missing.length;
            elements.issuesCount.textContent = mismatches.length + extra.length;

            // Display results
            let html = '';
            
            if (missing.length > 0) {
                html += '<h3 style="color: #ff3b30; margin-top: 20px;">Missing Items</h3>';
                missing.forEach(item => {
                    html += `<div class="item missing">
                        <div class="item-info">
                            <div class="item-sku">${item.sku}</div>
                            <div class="item-name">${item.name}</div>
                        </div>
                        <div class="item-badge badge-missing">Expected: ${item.quantity}</div>
                    </div>`;
                });
            }

            if (mismatches.length > 0) {
                html += '<h3 style="color: #007aff; margin-top: 20px;">Quantity Mismatches</h3>';
                mismatches.forEach(item => {
                    html += `<div class="item mismatch">
                        <div class="item-info">
                            <div class="item-sku">${item.sku}</div>
                            <div class="item-name">${item.name} - Expected: ${item.quantity}, Scanned: ${item.scanned}</div>
                        </div>
                        <div class="item-badge badge-mismatch">Diff: ${item.diff > 0 ? '+' : ''}${item.diff}</div>
                    </div>`;
                });
            }

            if (extra.length > 0) {
                html += '<h3 style="color: #ff9500; margin-top: 20px;">Extra Items</h3>';
                extra.forEach(item => {
                    html += `<div class="item extra">
                        <div class="item-info">
                            <div class="item-sku">${item.sku}</div>
                            <div class="item-name">${item.name}</div>
                        </div>
                        <div class="item-badge badge-extra">Scanned: ${item.count}</div>
                    </div>`;
                });
            }

            if (html === '') {
                html = '<div class="status status-success">✅ Perfect audit! No issues found.</div>';
            }

            elements.reportResults.innerHTML = html;

            stopScanner();
            elements.scannerSection.classList.add('hidden');
            elements.reportSection.classList.remove('hidden');
        }

        // Export Excel
        function exportExcel() {
            try {
                const wb = XLSX.utils.book_new();
                
                // Summary
                const summary = [
                    ['Stock Audit Report'],
                    ['Date:', new Date().toLocaleDateString()],
                    [''],
                    ['Total Items:', inventory.length],
                    ['Items Scanned:', Object.values(scannedItems).reduce((s, i) => s + i.count, 0)],
                    ['Matched:', elements.matchCount.textContent],
                    ['Missing:', elements.missingCount.textContent],
                    ['Issues:', elements.issuesCount.textContent]
                ];
                const ws1 = XLSX.utils.aoa_to_sheet(summary);
                XLSX.utils.book_append_sheet(wb, ws1, 'Summary');

                // Full Inventory
                const invData = [['SKU', 'Name', 'Expected', 'Scanned', 'Status']];
                inventory.forEach(item => {
                    const scanned = scannedItems[item.sku] ? scannedItems[item.sku].count : 0;
                    let status = 'Missing';
                    if (scanned === item.quantity && scanned > 0) status = 'Match';
                    else if (scanned > 0) status = 'Mismatch';
                    invData.push([item.sku, item.name, item.quantity, scanned, status]);
                });
                const ws2 = XLSX.utils.aoa_to_sheet(invData);
                XLSX.utils.book_append_sheet(wb, ws2, 'Inventory');

                XLSX.writeFile(wb, `Audit_${new Date().toLocaleDateString().replace(/\//g, '-')}.xlsx`);
                showFeedback('Excel downloaded!');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Export PDF
        function exportPDF() {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                doc.setFontSize(20);
                doc.text('Stock Audit Report', 105, 20, { align: 'center' });
                
                doc.setFontSize(10);
                doc.text(`Date: ${new Date().toLocaleDateString()}`, 105, 30, { align: 'center' });

                // Summary
                const summaryData = [
                    ['Total Items', inventory.length],
                    ['Matched', elements.matchCount.textContent],
                    ['Missing', elements.missingCount.textContent],
                    ['Issues', elements.issuesCount.textContent]
                ];

                doc.autoTable({
                    startY: 40,
                    head: [['Metric', 'Count']],
                    body: summaryData,
                    theme: 'striped'
                });

                // Full Inventory
                const invData = inventory.map(item => {
                    const scanned = scannedItems[item.sku] ? scannedItems[item.sku].count : 0;
                    let status = 'Missing';
                    if (scanned === item.quantity && scanned > 0) status = 'Match';
                    else if (scanned > 0) status = 'Mismatch';
                    return [item.sku, item.name, item.quantity, scanned, status];
                });

                doc.autoTable({
                    startY: doc.lastAutoTable.finalY + 10,
                    head: [['SKU', 'Name', 'Expected', 'Scanned', 'Status']],
                    body: invData,
                    theme: 'grid'
                });

                doc.save(`Audit_${new Date().toLocaleDateString().replace(/\//g, '-')}.pdf`);
                showFeedback('PDF downloaded!');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Reset Audit
        function resetAudit() {
            scannedItems = {};
            lastScan = { code: null, time: 0 };
            elements.scannedCount.textContent = '0';
            elements.uniqueCount.textContent = '0';
            elements.reportSection.classList.add('hidden');
            elements.scannerSection.classList.remove('hidden');
            updateScannedList();
            updateMissingList();
        }

        // Utility Functions
        function showStatus(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.className = `status status-${type}`;
            el.textContent = message;
            el.style.display = 'block';
        }

        function showFeedback(message) {
            const div = document.createElement('div');
            div.className = 'scan-feedback';
            div.textContent = '✓ ' + message;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 1000);
        }

        function playBeep() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 800;
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.1);
        }

        console.log('Stock Audit App loaded successfully!');
    </script>
</body>
</html>
